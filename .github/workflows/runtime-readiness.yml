name: Runtime Readiness Gate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: Backend pytest gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest httpx

      - name: Run backend tests
        run: |
          pytest -q

  smoke-script-static:
    name: Smoke script static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate smoke script syntax
        run: |
          bash -n scripts/runtime_smoke_check.sh

      - name: Validate smoke script keeps local runtime posture
        run: |
          grep -q 'BASE_URL="${BASE_URL:-http://localhost:8030}"' scripts/runtime_smoke_check.sh
          grep -q 'Phase 23 - Runtime Readiness Orchestration / Smoke Check CI Gate' scripts/runtime_smoke_check.sh
          grep -q 'Phase 22 - FastAPI Lifespan Migration / Startup Contract Hardening Gate' scripts/runtime_smoke_check.sh
          grep -q 'Phase 20 - Offline Resilience Validation Evidence' scripts/runtime_smoke_check.sh
          grep -q '"production_authority": "not_granted"' scripts/runtime_smoke_check.sh
          grep -q '"runtime_mutation": "not_granted"' scripts/runtime_smoke_check.sh
          grep -q '"policy_mutation": "not_granted"' scripts/runtime_smoke_check.sh
          grep -q '"black_box_custody_bypass": "not_allowed"' scripts/runtime_smoke_check.sh
